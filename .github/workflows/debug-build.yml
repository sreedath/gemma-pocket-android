name: Debug APK
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: 'true' }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      - uses: nttld/setup-ndk@v1
        id: ndk
        with: { ndk-version: r27c, add-to-path: true }
      - name: Download bundled GGUF model into assets
        run: |
          mkdir -p app/src/main/assets
          curl -L --fail -o app/src/main/assets/gemma-2-2b-qa-raft-Q4_K_M.gguf \
            https://huggingface.co/thesreedath/gemma-2-2b-qa-raft-GGUF/resolve/main/gemma-2-2b-qa-raft-Q4_K_M.gguf
          curl -L --fail -o app/src/main/assets/minilm.onnx \
            https://huggingface.co/thesreedath/gemma-2-2b-qa-raft-GGUF/resolve/main/minilm.onnx
          curl -L --fail -o app/src/main/assets/minilm_tokenizer.json \
            https://huggingface.co/thesreedath/gemma-2-2b-qa-raft-GGUF/resolve/main/minilm_tokenizer.json
          curl -L --fail -o app/src/main/assets/retrieval_pack.json \
            https://huggingface.co/thesreedath/gemma-2-2b-qa-raft-GGUF/resolve/main/retrieval_pack.json
          ls -lh app/src/main/assets/
      - run: chmod +x gradlew
      - name: Build APK
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./gradlew assembleDebug --stacktrace
      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk gemma-pocket.apk
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gemma-pocket-latest
          name: Gemma Pocket (bundled, offline)
          files: gemma-pocket.apk
